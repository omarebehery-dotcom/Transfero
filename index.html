<!DOCTYPE html>

<html>

<head>

<script src="https://rawgit.com/schmich/instascan-builds/master/instascan.min.js"></script>

</head>

<body>

<video id="preview"></video>

<button onclick="sendData()">Send</button>


<div id="progressContainer" style="display:none;">

<progress id="progressBar" value="0" max="100"></progress>

<span id="status">0%</span>

</div>



<script>

let scanner = new Instascan.Scanner({ video: document.getElementById('preview') });

scanner.addListener('scan', function (content) {

window.AppInventor.setWebViewString("SCAN:" + content);

});

Instascan.Camera.getCameras().then(c => scanner.start(c[0]));



function sendData() {

window.AppInventor.setWebViewString("SEND");

}



// دالة يستدعيها كودولار لتحديث شريط التحميل

function updateProgress(val) {

document.getElementById('progressContainer').style.display = "block";

document.getElementById('progressBar').value = val;

document.getElementById('status').innerText = val + "%";

}

</script>

</body>

</html>
