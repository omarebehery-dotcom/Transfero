<!DOCTYPE html>

<html lang="ar">

<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://rawgit.com/schmich/instascan-builds/master/instascan.min.js"></script>

<style>

body { background: #000; color: #fff; text-align: center; font-family: sans-serif; padding: 20px; }

.input-group { margin: 20px 0; }

input { padding: 15px; width: 80%; border-radius: 10px; border: none; text-align: center; font-size: 18px; }

.btn { width: 90%; padding: 15px; margin: 10px; border-radius: 15px; border: none; font-size: 18px; cursor: pointer; }

#camera-area { width: 100%; height: 250px; display: none; border-radius: 10px; }

</style>

</head>

<body>



<div class="input-group">

<input type="text" id="roomInput" placeholder="أدخل رمز الغرفة">

<button class="btn" style="background:#007bff" onclick="connectToRoom()">اتصل بالغرفة</button>

<button class="btn" style="background:#ff9800" onclick="startScanner()">أو امسح QR</button>

</div>



<button class="btn" style="background:#28a745" onclick="showMyQR()">إنشاء غرفة جديدة (RECEIVE)</button>



<video id="camera-area"></video>

<div id="qr-display"></div>



<script>

// الاتصال برقم الغرفة المكتوب

function connectToRoom() {

let code = document.getElementById('roomInput').value;

if(code) window.AppInventor.setWebViewString("CONNECT:" + code);

else alert("من فضلك اكتب الرمز أولاً");

}



// تشغيل الكاميرا للمسح

function startScanner() {

document.getElementById('camera-area').style.display = 'block';

let s = new Instascan.Scanner({ video: document.getElementById('camera-area') });

s.addListener('scan', c => window.AppInventor.setWebViewString("SCAN:" + c));

Instascan.Camera.getCameras().then(c => { if(c.length>0) s.start(c[0]); });

}



// توليد QR للغرفة

function showMyQR() {

let code = Math.floor(1000 + Math.random() * 9000);

window.AppInventor.setWebViewString("ROOM:" + code);

alert("كود غرفتك هو: " + code);

}

</script>

</body>

</html>
