```html
<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<script src="https://cdnjs.cloudflare.com/ajax/libs/instascan/1.0.0/instascan.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<style>
body{
    margin:0;
    background:#0f172a;
    color:white;
    font-family:Tahoma;
}

.page{
    display:none;
    height:100vh;
    padding:20px;
    text-align:center;
}

.active{
    display:block;
}

h1{
    margin-top:60px;
}

.btn{
    width:90%;
    max-width:350px;
    padding:18px;
    border:none;
    border-radius:20px;
    color:white;
    font-size:20px;
    margin:15px auto;
    display:block;
}

.sendBtn{
    background:#2563eb;
}

.receiveBtn{
    background:#16a34a;
}

.backBtn{
    background:#374151;
}

input{
    width:90%;
    max-width:350px;
    padding:15px;
    border:none;
    border-radius:15px;
    font-size:18px;
    text-align:center;
    margin-top:20px;
}

#camera{
    width:90%;
    max-width:350px;
    border-radius:20px;
    margin-top:20px;
}

#qr{
    width:230px;
    height:230px;
    background:white;
    margin:30px auto;
    border-radius:20px;
    padding:10px;
}

#roomCode{
    font-size:30px;
    font-weight:bold;
}
</style>
</head>

<body>

<!-- الصفحة الرئيسية -->
<div id="home" class="page active">
    <h1>Transfero</h1>

    <button class="btn sendBtn"
    onclick="openSend()">
        📤 SEND
    </button>

    <button class="btn receiveBtn"
    onclick="openReceive()">
        📥 RECEIVE
    </button>
</div>

<!-- صفحة الإرسال -->
<div id="sendPage" class="page">

    <h1>Send Files</h1>

    <video id="camera" playsinline></video>

    <input id="roomInput"
    placeholder="اكتب رمز الغرفة">

    <button class="btn sendBtn"
    onclick="connectRoom()">
        اتصال
    </button>

    <button class="btn backBtn"
    onclick="goHome()">
        رجوع
    </button>

</div>

<!-- صفحة الاستقبال -->
<div id="receivePage" class="page">

    <h1>Receive Files</h1>

    <div id="roomCode"></div>

    <div id="qr"></div>

    <button class="btn backBtn"
    onclick="goHome()">
        رجوع
    </button>

</div>

<script>
let scanner;

function hideAll(){
    document.querySelectorAll(".page")
    .forEach(p=>p.classList.remove("active"));
}

function goHome(){
    hideAll();
    document.getElementById("home")
    .classList.add("active");

    if(scanner){
        scanner.stop();
    }
}

function openSend(){
    hideAll();

    document.getElementById("sendPage")
    .classList.add("active");

    startCamera();
}

function openReceive(){
    hideAll();

    document.getElementById("receivePage")
    .classList.add("active");

    createRoom();
}

function startCamera(){

    let video =
        document.getElementById("camera");

    scanner =
        new Instascan.Scanner({
            video:video,
            mirror:false
        });

    scanner.addListener(
        "scan",
        function(content){

            document.getElementById(
                "roomInput"
            ).value = content;

            if(window.AppInventor){
                window.AppInventor
                .setWebViewString(
                    "SCAN:"+content
                );
            }
        }
    );

    Instascan.Camera.getCameras()
    .then(function(cameras){

        if(cameras.length>0){
            scanner.start(
                cameras[cameras.length-1]
            );
        }
    });
}

function createRoom(){

    let code =
        Math.floor(
            100000 +
            Math.random()*900000
        );

    document.getElementById(
        "roomCode"
    ).innerHTML =
    "Room Code<br>"+code;

    let qr =
        document.getElementById("qr");

    qr.innerHTML = "";

    new QRCode(qr,{
        text:String(code),
        width:200,
        height:200
    });

    if(window.AppInventor){
        window.AppInventor
        .setWebViewString(
            "ROOM:"+code
        );
    }
}

function connectRoom(){

    let code =
        document.getElementById(
            "roomInput"
        ).value;

    if(window.AppInventor){
        window.AppInventor
        .setWebViewString(
            "CONNECT:"+code
        );
    }
}
</script>

</body>
</html>
```
