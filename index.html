<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Transfero</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/instascan/1.0.0/instascan.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    min-height:100vh;
    background:linear-gradient(180deg,#3b82f6,#1d4ed8);
    color:white;
}

.page{
    display:none;
    min-height:100vh;
    padding:25px;
}

.active{
    display:block;
}

.logo{
    text-align:center;
    font-size:40px;
    font-weight:bold;
    margin-top:60px;
    margin-bottom:60px;
}

.bigBtn{
    width:230px;
    height:230px;
    border-radius:50%;
    border:none;
    display:block;
    margin:25px auto;
    font-size:30px;
    font-weight:bold;
    color:white;
    cursor:pointer;
    box-shadow:0 10px 30px rgba(0,0,0,.3);
}

.send{
    background:#2563eb;
}

.receive{
    background:#22c55e;
}

.card{
    background:white;
    color:#111;
    border-radius:25px;
    padding:25px;
    max-width:420px;
    margin:20px auto;
}

input{
    width:100%;
    padding:15px;
    border-radius:15px;
    border:1px solid #ccc;
    font-size:18px;
    text-align:center;
}

.btn{
    width:100%;
    padding:15px;
    border:none;
    border-radius:15px;
    margin-top:15px;
    color:white;
    font-size:18px;
    cursor:pointer;
}

.blue{background:#2563eb;}
.gray{background:#475569;}
.purple{background:#9333ea;}

#camera{
    width:100%;
    height:250px;
    background:#ddd;
    border-radius:20px;
    margin-top:20px;
    object-fit:cover;
}

#qr{
    width:230px;
    height:230px;
    background:white;
    margin:20px auto;
    border-radius:20px;
    display:flex;
    align-items:center;
    justify-content:center;
    color:black;
}

#roomCode{
    text-align:center;
    font-size:30px;
    font-weight:bold;
}
</style>
</head>

<body>

<div id="home" class="page active">

    <div class="logo">
        Transfero
    </div>

    <button class="bigBtn send"
    onclick="openSend()">
        SEND
    </button>

    <button class="bigBtn receive"
    onclick="openReceive()">
        RECEIVE
    </button>

</div>

<div id="sendPage" class="page">

    <div class="card">

        <h2>Send Files</h2>

        <video id="camera" playsinline></video>

        <input
        id="roomInput"
        placeholder="Room Code">

        <button class="btn blue">
            Connect
        </button>

        <input
        type="file"
        id="fileInput"
        multiple
        hidden>

        <button
        class="btn purple"
        onclick="
        document.getElementById('fileInput').click()
        ">
            📁 Choose Files
        </button>

        <button
        class="btn gray"
        onclick="goHome()">
            Back
        </button>

    </div>

</div>

<div id="receivePage" class="page">

    <div class="card">

        <h2>Receive Files</h2>

        <div id="roomCode"></div>

        <div id="qr"></div>

        <button
        class="btn gray"
        onclick="goHome()">
            Back
        </button>

    </div>

</div>

<script>
let scanner = null;

function hideAll(){
    document
    .querySelectorAll('.page')
    .forEach(
        p=>p.classList.remove('active')
    );
}

function startCamera(){

    let video =
        document.getElementById('camera');

    if(scanner){
        scanner.stop();
    }

    scanner =
        new Instascan.Scanner({
            video: video,
            mirror:false
        });

    scanner.addListener(
        'scan',
        function(content){

            document
            .getElementById(
                'roomInput'
            ).value = content;
        }
    );

    Instascan.Camera
    .getCameras()
    .then(function(cameras){

        if(cameras.length > 0){
            scanner.start(
                cameras[cameras.length - 1]
            );
        }else{
            alert('لا توجد كاميرا');
        }
    })
    .catch(function(e){
        console.log(e);
    });
}

function openSend(){
    hideAll();

    document
    .getElementById('sendPage')
    .classList.add('active');

    startCamera();
}

function openReceive(){
    hideAll();

    document
    .getElementById('receivePage')
    .classList.add('active');

    let code =
        Math.floor(
            100000 +
            Math.random()*900000
        );

    document
    .getElementById('roomCode')
    .innerHTML = code;

    let qr =
        document
        .getElementById('qr');

    qr.innerHTML = '';

    new QRCode(qr,{
        text:String(code),
        width:220,
        height:220
    });
}

function goHome(){

    hideAll();

    document
    .getElementById('home')
    .classList.add('active');

    if(scanner){
        scanner.stop();
    }
}
</script>

</body>
</html>
