
<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdnjs.cloudflare.com/ajax/libs/instascan/1.0.0/instascan.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Tahoma,sans-serif;
}

body{
    background:linear-gradient(135deg,#0f172a,#1e293b);
    color:white;
    text-align:center;
    min-height:100vh;
    padding:20px;
}

h1{
    margin-top:30px;
    margin-bottom:40px;
    font-size:35px;
}

.card{
    background:rgba(255,255,255,.08);
    padding:25px;
    border-radius:25px;
    max-width:420px;
    margin:auto;
    backdrop-filter:blur(10px);
}

.btn{
    width:100%;
    padding:16px;
    border:none;
    border-radius:18px;
    margin-top:15px;
    color:white;
    font-size:18px;
    cursor:pointer;
    transition:.3s;
    font-weight:bold;
}

.btn:hover{
    transform:scale(1.03);
}

.send{
    background:#2563eb;
}

.receive{
    background:#16a34a;
}

.scan{
    background:#f59e0b;
}

.files{
    background:#9333ea;
}

input{
    width:100%;
    padding:15px;
    border:none;
    border-radius:15px;
    text-align:center;
    font-size:18px;
    margin-top:15px;
}

#camera{
    width:100%;
    max-width:350px;
    margin:20px auto;
    border-radius:20px;
    display:none;
}

#qr{
    background:white;
    width:220px;
    height:220px;
    margin:20px auto;
    border-radius:20px;
    display:none;
    padding:10px;
}

#roomCode{
    font-size:30px;
    font-weight:bold;
    margin-top:20px;
}
</style>
</head>

<body>

<h1>Transfero</h1>

<div class="card">

<input id="roomInput" placeholder="اكتب رمز الغرفة">

<button class="btn send" onclick="connectRoom()">
📤 SEND
</button>

<button class="btn scan" onclick="startScanner()">
📷 Scan QR
</button>

<button class="btn receive" onclick="createRoom()">
📥 RECEIVE
</button>

<button class="btn files" onclick="pickFiles()">
📁 اختيار ملفات
</button>

<input type="file" id="fileInput" multiple hidden>

<div id="roomCode"></div>

<video id="camera" playsinline></video>

<div id="qr"></div>

</div>

<script>
let scanner = null;

function connectRoom(){
    let code =
        document.getElementById("roomInput").value;

    if(code===""){
        alert("اكتب رمز الغرفة");
        return;
    }

    alert("تم الاتصال بالغرفة: " + code);

    if(window.AppInventor){
        window.AppInventor
        .setWebViewString("CONNECT:"+code);
    }
}

function createRoom(){

    stopScanner();

    let code =
        Math.floor(
            100000 +
            Math.random()*900000
        );

    document.getElementById("roomCode")
        .innerHTML =
        "Room Code : " + code;

    let qr =
        document.getElementById("qr");

    qr.innerHTML = "";
    qr.style.display = "block";

    new QRCode(qr,{
        text:String(code),
        width:200,
        height:200
    });

    if(window.AppInventor){
        window.AppInventor
        .setWebViewString("ROOM:"+code);
    }
}

function startScanner(){

    document.getElementById("qr")
        .style.display = "none";

    let video =
        document.getElementById("camera");

    video.style.display = "block";

    if(!scanner){

        scanner =
            new Instascan.Scanner({
                video:video,
                mirror:false
            });

        scanner.addListener(
            'scan',
            function(content){

                document.getElementById(
                    "roomInput"
                ).value = content;

                alert(
                    "تم مسح الكود: "
                    + content
                );

                stopScanner();

                if(window.AppInventor){
                    window.AppInventor
                    .setWebViewString(
                        "SCAN:"+content
                    );
                }
            }
        );
    }

    Instascan.Camera.getCameras()
        .then(function(cameras){

            if(cameras.length>0){
                scanner.start(
                    cameras[cameras.length-1]
                );
            }else{
                alert(
                    "لا توجد كاميرا"
                );
            }
        });
}

function stopScanner(){
    if(scanner){
        scanner.stop();
    }

    document.getElementById(
        "camera"
    ).style.display="none";
}

function pickFiles(){
    document.getElementById(
        "fileInput"
    ).click();
}

document.getElementById(
    "fileInput"
).addEventListener(
    "change",
    function(){

        let files = this.files;

        if(files.length===0)
            return;

        let names = [];

        for(let i=0;i<files.length;i++){
            names.push(
                files[i].name
            );
        }

        alert(
            "تم اختيار:\n"+
            names.join("\n")
        );

        if(window.AppInventor){
            window.AppInventor
            .setWebViewString(
                "FILES:"+
                names.join("|")
            );
        }
    }
);
</script>

</body>
</html>
```
