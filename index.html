<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR Scanner - App Inventor</title>
    
    <script src="https://rawgit.com/schmich/instascan-builds/master/instascan.min.js"></script>
    
    <style>
        body { 
            margin: 0; 
            background: #000; 
            color: #fff; 
            text-align: center; 
            padding: 20px; 
            font-family: Arial, sans-serif;
        }
        .btn { 
            width: 100%; 
            padding: 20px; 
            margin: 10px 0; 
            border-radius: 15px; 
            border: none; 
            font-size: 20px; 
            font-weight: bold; 
            cursor: pointer; 
        }
        #video { 
            width: 100%; 
            border-radius: 15px; 
            display: none; 
            margin-top: 10px;
        }
        #progress { 
            display: none; 
            margin-top: 20px; 
        }
    </style>
</head>
<body>

    <button class="btn" style="background:#007bff" onclick="window.AppInventor.setWebViewString('SEND')">SEND</button>
    <button class="btn" style="background:#28a745" onclick="startQR()">RECEIVE</button>

    <video id="video" playsinline></video>

    <div id="progress">
        <progress id="bar" value="0" max="100" style="width:100%"></progress>
        <span id="text">0%</span>
    </div>

    <script>
        // دالة تشغيل الكاميرا وقراءة الـ QR Code
        function startQR() {
            const videoElement = document.getElementById('video');
            videoElement.style.display = 'block';

            let s = new Instascan.Scanner({ video: videoElement });

            // إرسال النتيجة إلى تطبيق App Inventor عند نجاح الفحص
            s.addListener('scan', c => {
                window.AppInventor.setWebViewString("RESULT:" + c);
            });

            // الحصول على الكاميرات المتاحة وتشغيل الكاميرا الخلفية (غالباً الكاميرا الأولى في الهواتف)
            Instascan.Camera.getCameras()
                .then(c => { 
                    if (c.length > 0) {
                        s.start(c[0]); 
                    } else {
                        alert("لم يتم العثور على كاميرات في الجهاز.");
                    }
                })
                .catch(err => {
                    console.error(err);
                    alert("حدث خطأ أثناء محاولة تشغيل الكاميرا.");
                });
        }

        // دالة تحديث شريط التقدم من خلال App Inventor
        function updateProgress(v) {
            document.getElementById('progress').style.display = 'block';
            document.getElementById('bar').value = v;
            document.getElementById('text').innerText = v + "%";
        }
    </script>

</body>
</html>
