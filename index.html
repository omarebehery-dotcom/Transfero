```html
<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Transfero</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    min-height:100vh;
    background:linear-gradient(180deg,#3b82f6,#1d4ed8);
    color:white;
}

/* الصفحات */
.page{
    display:none;
    min-height:100vh;
    padding:25px;
}

.active{
    display:block;
}

/* الرئيسية */
.logo{
    text-align:center;
    font-size:40px;
    font-weight:bold;
    margin-top:60px;
    margin-bottom:60px;
}

.bigBtn{
    width:230px;
    height:230px;
    border-radius:50%;
    border:none;
    display:block;
    margin:25px auto;
    font-size:30px;
    font-weight:bold;
    color:white;
    cursor:pointer;
    box-shadow:0 10px 30px rgba(0,0,0,.3);
}

.send{
    background:#2563eb;
}

.receive{
    background:#22c55e;
}

.card{
    background:white;
    color:#111;
    border-radius:25px;
    padding:25px;
    max-width:420px;
    margin:20px auto;
}

input{
    width:100%;
    padding:15px;
    border-radius:15px;
    border:1px solid #ccc;
    font-size:18px;
    text-align:center;
}

.btn{
    width:100%;
    padding:15px;
    border:none;
    border-radius:15px;
    margin-top:15px;
    color:white;
    font-size:18px;
    cursor:pointer;
}

.blue{
    background:#2563eb;
}

.gray{
    background:#475569;
}

.purple{
    background:#9333ea;
}

#camera{
    width:100%;
    height:250px;
    background:#ddd;
    border-radius:20px;
    margin-top:20px;
}

#qr{
    width:230px;
    height:230px;
    background:white;
    margin:20px auto;
    border-radius:20px;
    display:flex;
    align-items:center;
    justify-content:center;
    color:black;
}

#roomCode{
    text-align:center;
    font-size:30px;
    font-weight:bold;
}
</style>
</head>

<body>

<!-- الرئيسية -->
<div id="home" class="page active">

    <div class="logo">
        Transfero
    </div>

    <button class="bigBtn send"
    onclick="openSend()">
        SEND
    </button>

    <button class="bigBtn receive"
    onclick="openReceive()">
        RECEIVE
    </button>

</div>

<!-- صفحة الإرسال -->
<div id="sendPage" class="page">

    <div class="card">

        <h2>Send Files</h2>

        <div id="camera">
        </div>

        <input
        id="roomInput"
        placeholder="Room Code">

        <button class="btn blue">
            Connect
        </button>

        <input
        type="file"
        id="fileInput"
        multiple
        hidden>

        <button
        class="btn purple"
        onclick="
        document.getElementById('fileInput').click()
        ">
            📁 Choose Files
        </button>

        <button
        class="btn gray"
        onclick="goHome()">
            Back
        </button>

    </div>

</div>

<!-- صفحة الاستقبال -->
<div id="receivePage" class="page">

    <div class="card">

        <h2>Receive Files</h2>

        <div id="roomCode">
            483921
        </div>

        <div id="qr">
            QR CODE
        </div>

        <button
        class="btn gray"
        onclick="goHome()">
            Back
        </button>

    </div>

</div>

<script>
function hideAll(){
    document
    .querySelectorAll('.page')
    .forEach(
        p=>p.classList.remove('active')
    );
}

function openSend(){
    hideAll();
    document
    .getElementById('sendPage')
    .classList.add('active');
}

function openReceive(){
    hideAll();

    document
    .getElementById('receivePage')
    .classList.add('active');

    document
    .getElementById('roomCode')
    .innerHTML =
    Math.floor(
        100000+
        Math.random()*900000
    );
}

function goHome(){
    hideAll();

    document
    .getElementById('home')
    .classList.add('active');
}
</script>

</body>
</html>
```
